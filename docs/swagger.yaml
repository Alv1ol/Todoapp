        "404":
          description: task not found
          schema:
            $ref: '#/definitions/github_com_Alv1ol_Todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/github_com_Alv1ol_Todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Delete task
      tags:
      - tasks
    get:
      consumes:
      - application/json
      description: Get task by id
      parameters:
      - description: task id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.GetTaskResponce'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Alv1ol_Todoapp_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: task not found
          schema:
            $ref: '#/definitions/github_com_Alv1ol_Todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/github_com_Alv1ol_Todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Get task
      tags:
      - tasks

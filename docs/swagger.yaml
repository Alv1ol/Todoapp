paths:
  /statistics:
    get:
      consumes:
      - application/json
      description: Get statistics. UserID, from and to query params are optional.
        If userID is provided, statistics will be returned for specific user, otherwise
        for all users. From and to query params are used to filter statistics by date.
        Date must be in format `YYYY-MM-DD`. If from is provided, statistics will
        be returned from this date, otherwise from the beginning of time. If to is
        provided, statistics will be returned to this date, otherwise to the end of
        time.
      parameters:
      - description: user id
        in: query
        name: user_id
        type: integer
      - description: from date in format `YYYY-MM-DD`
        in: query
        name: from
        type: string
      - description: to date in format `YYYY-MM-DD`
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_features_statistics_transport_http.GetStatisticsResponce'
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Alv1ol_Todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/github_com_Alv1ol_Todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Get statistics
      tags:
      - statistics
  /tasks:
    get:
      consumes:
      - application/json
      description: Get tasks with optional filtering by user_id and pagination
      parameters:
      - description: filter by user id
        in: query
        name: user_id
        type: integer
      - description: limit number of tasks returned
        in: query
        name: limit
        type: integer
      - description: offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              items:
                $ref: '#/definitions/internal_features_tasks_transport_http.TaskDTOResponce'
              type: array
            type: array
        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Alv1ol_Todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/github_com_Alv1ol_Todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Get tasks
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Create task with title, optional description and author user id
      parameters:
      - description: create task request
        in: body
        name: request
        required: true

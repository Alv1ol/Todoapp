        "400":
          description: bad request
          schema:
            $ref: '#/definitions/github_com_Alv1ol_Todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/github_com_Alv1ol_Todoapp_internal_core_transport_http_response.ErrorResponse'
      summary: Create task
      tags:
      - tasks
  /tasks/{id}:
    delete:
      consumes:
      - application/json
      description: Delete task by id
      parameters:
      - description: task id
        in: path
        name: id
        required: true
        type: integer
      produces:
